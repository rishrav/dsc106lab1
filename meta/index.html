<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css?v=6">
    <title>Meta</title>
</head>
<body>
    <section id="meta">
        <h1>Meta</h1>
        <p>This page contains a meta-analysis of the source code that powers this site:
            commit history, lines of code, and how the codebase has evolved over time.</p>

        <div id="stats"></div>

        <h2>Commits by time of day</h2>
        <div id="chart"></div>

        <h2>Selection</h2>
        <p id="selection-count">No commits selected</p>
        <dl id="language-breakdown" class="stats"></dl>

        <dl id="commit-tooltip" class="info tooltip" hidden>
            <dt>Commit</dt>
            <dd><a href="" id="commit-link" target="_blank"></a></dd>

            <dt>Date</dt>
            <dd id="commit-date"></dd>

            <dt>Time</dt>
            <dd id="commit-time"></dd>

            <dt>Author</dt>
            <dd id="commit-author"></dd>

            <dt>Lines edited</dt>
            <dd id="commit-lines"></dd>
        </dl>
    </section>
    <script type="module" src="main.js?v=6"></script>
</body>
</html>
